{% extends 'base.html' %}
{% block title %}Nueva Tarea{% endblock %}
{% block page_title %}Nueva Tarea{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-journal-richtext"></i> Crear Tarea
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Título <span class="text-danger">*</span></label>
                        <input type="text" name="titulo" class="form-control" required
                               placeholder="Ej: Resolución de problemas de álgebra">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="4"
                                  placeholder="Instrucciones detalladas para la tarea..."></textarea>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Materia <span class="text-danger">*</span></label>
                            <select name="materia" class="form-select" required>
                                <option value="">— Seleccionar —</option>
                                {% for m in materias %}
                                <option value="{{ m.id }}">{{ m.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Grupo <span class="text-danger">*</span></label>
                            <select name="grupo" class="form-select" required>
                                <option value="">— Seleccionar —</option>
                                {% for g in grupos %}
                                <option value="{{ g.id }}">{{ g.grado.nombre }} - {{ g.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    {% if user.rol == 'admin' or user.rol == 'director' %}
                    <div class="mb-3">
                        <label class="form-label">Profesor <span class="text-danger">*</span></label>
                        <select name="profesor" class="form-select" required>
                            <option value="">— Seleccionar —</option>
                            {% for p in profesores %}
                            <option value="{{ p.id }}">{{ p.get_full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% endif %}
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Fecha de entrega <span class="text-danger">*</span></label>
                            <input type="date" name="fecha_entrega" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Archivo adjunto</label>
                            <input type="file" name="archivo" class="form-control"
                                   accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar,.jpg,.png">
                            <small class="text-muted">Opcional. PDF, Word, Excel, imágenes, etc.</small>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Guardar Tarea
                        </button>
                        <a href="{% url 'lista_tareas' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
